name: 🎬🎵new-Multi-Platform Downloader (YouTube + SoundCloud + Release)

on:
  workflow_dispatch:
    inputs:
      platform:
        description: '🌐 پلتفرم'
        required: true
        default: 'youtube'
        type: choice
        options:
          - 'youtube'
          - 'soundcloud'
      url:
        description: '🔗 لینک ویدئو / آهنگ'
        required: true
      format:
        description: '🎬 خروجی'
        required: true
        default: 'video'
        type: choice
        options:
          - 'video'
          - 'audio'
      folder:
        description: '📁 پوشهٔ موقت دانلود'
        required: false
        default: 'downloads'

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 📥 دریافت فایل‌های مخزن
        uses: actions/checkout@v4

      - name: ⚙️ نصب و به‌روزرسانی yt‑dlp
        run: |
          pip install --upgrade yt-dlp
          yt-dlp --version

      - name: 🧹 پاکسازی پوشهٔ دانلود
        run: rm -rf "${{ github.event.inputs.folder }}"/*

      # ================= YouTube =================
      - name: ▶️ یوتیوب | دانلود ویدئو (MP4)
        if: github.event.inputs.platform == 'youtube' && github.event.inputs.format == 'video'
        run: |
          mkdir -p "${{ github.event.inputs.folder }}"
          yt-dlp -f "bestvideo[height<=1080]+bestaudio/best[height<=1080]" \
            --merge-output-format mp4 \
            --cookies cookies.txt \
            --force-overwrites \
            "${{ github.event.inputs.url }}" \
            -o "${{ github.event.inputs.folder }}/%(title)s.%(ext)s"

      - name: ▶️ یوتیوب | دانلود صوت (MP3)
        if: github.event.inputs.platform == 'youtube' && github.event.inputs.format == 'audio'
        run: |
          mkdir -p "${{ github.event.inputs.folder }}"
          yt-dlp -f "bestaudio[ext=m4a]/bestaudio/best" \
            --audio-format mp3 \
            --audio-quality 0 \
            --cookies cookies.txt \
            --force-overwrites \
            --no-playlist \
            "${{ github.event.inputs.url }}" \
            -o "${{ github.event.inputs.folder }}/%(title)s.%(ext)s"

      # ================= SoundCloud =================
      - name: ☁️ ساندکلاد | دانلود صوت (MP3)
        if: github.event.inputs.platform == 'soundcloud' && github.event.inputs.format == 'audio'
        run: |
          mkdir -p "${{ github.event.inputs.folder }}"
          yt-dlp -x --audio-format mp3 --audio-quality 0 \
            --no-playlist \
            --force-ipv4 \
            "${{ github.event.inputs.url }}" \
            -o "${{ github.event.inputs.folder }}/%(title)s.%(ext)s"

      - name: ☁️ ساندکلاد | دانلود ویدئو (در صورت وجود)
        if: github.event.inputs.platform == 'soundcloud' && github.event.inputs.format == 'video'
        run: |
          mkdir -p "${{ github.event.inputs.folder }}"
          yt-dlp -f bestvideo+bestaudio/best --merge-output-format mp4 \
            --no-playlist \
            "${{ github.event.inputs.url }}" \
            -o "${{ github.event.inputs.folder }}/%(title)s.%(ext)s"

      # ================= ذخیره و انتشار =================
      - name: 🚀 ذخیره در مخزن (فقط ویدئوها با LFS)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          sudo apt-get update && sudo apt-get install -y git-lfs
          git lfs install
          # فقط ویدئوها را با LFS مدیریت کن (MP3 بدون LFS بماند)
          git lfs track "*.mp4" "*.webm" "*.mkv"
          git add .gitattributes "${{ github.event.inputs.folder }}"
          git commit -m "افزودن فایل از ${{ github.event.inputs.platform }}" || echo "هیچ فایل جدیدی نیست"
          git push

      - name: 📦 انتشار در Release (همهٔ فایل‌ها)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_FILE=$(ls -t "${{ github.event.inputs.folder }}"/*.{mp3,mp4} 2>/dev/null | head -1)

          if [ -z "$NEW_FILE" ]; then
            echo "هیچ فایلی برای انتشار وجود ندارد."
            exit 0
          fi

          if [ ! -f "$NEW_FILE" ]; then
            echo "خطا: فایل $NEW_FILE وجود ندارد."
            exit 1
          fi

          echo "فایل جدید برای انتشار: $NEW_FILE"

          if gh release view latest &> /dev/null; then
            echo "Release 'latest' پیدا شد. آپلود فایل جدید..."
            gh release upload latest "$NEW_FILE" --clobber
          else
            echo "ایجاد Release جدید با tag 'latest'..."
            gh release create latest "$NEW_FILE" \
              --title "مجموعه دانلودهای چندمنظوره" \
              --notes "فایل‌های دانلود شده از یوتیوب و ساندکلاد به‌صورت خودکار اینجا قرار می‌گیرند."
          fi

          # نمایش لینک مستقیم Release برای دانلود فایل‌های ویدیویی
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/latest"
          echo "📎 لینک دانلود همهٔ فایل‌ها (مخصوصاً ویدیوها): $RELEASE_URL"
