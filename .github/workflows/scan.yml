name:  دریافت آخرین ویدیوهای کانال (یوتیوب/ساندکلاد)

on:
  schedule:
    - cron: '*/15 * * * *'   # هر ۱۵ دقیقه
  workflow_dispatch:          # دکمه اجرای دستی

# صراحتاً اجازهٔ نوشتن به مخزن داده شود
permissions:
  contents: write

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scanner
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python youtube_scanner.py

      # استفاده از Action حرفه‌ای برای commit و push (بدون خطای ۱۲۸)
      - name: Commit logs and cache
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'Update logs & cache'
          file_pattern: 'logs/ cache/'
