name: 🎵 Automatic Audio Download from RSS

on:
  workflow_dispatch:   # فقط دستی یا از طریق gh workflow run

permissions:
  contents: write

jobs:
  download-audio:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0            # دریافت کل تاریخچه برای git log در اسکریپت پاک‌سازی

      - name: ⚙️ Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: pip install requests

      - name: 🛠️ Setup yt-dlp
        uses: AnimMouse/setup-yt-dlp@v3

      - name: 🎧 Run auto audio downloader
        run: python auto_audio_downloader.py

      - name: 🧹 Cleanup old audio files
        run: python cleanup_old_audio.py

      - name: 📌 Commit downloaded audio & state
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'Add audio downloads from RSS'
          # حذف file_pattern برای ثبت حذف‌ها نیز
