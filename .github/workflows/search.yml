name: 🔍 جستجوی یوتیوب و ساندکلاد (با کانال دلخواه)

on:
  workflow_dispatch:
    inputs:
      platform:
        description: '🌐 پلتفرم'
        required: true
        default: 'youtube'
        type: choice
        options:
          - 'youtube'
          - 'soundcloud'
      query:
        description: '🔍 عبارت جستجو'
        required: true
      channel:
        description: '📌 نام کانال (دلخواه) – مثلاً BBCPersian'
        required: false
        default: ''
      results:
        description: '📊 تعداد نتایج'
        required: false
        default: '10'

jobs:
  search:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 📥 دریافت فایل‌های مخزن
        uses: actions/checkout@v4

      - name: ⚙️ نصب yt‑dlp و jq
        uses: AnimMouse/setup-yt-dlp@v3
        with:
          ejs-node: true

      - name: 🔍 جستجو و تبدیل تاریخ
        run: |
          RESULTS="${{ github.event.inputs.results }}"
          QUERY="${{ github.event.inputs.query }}"
          PLATFORM="${{ github.event.inputs.platform }}"
          CHANNEL="${{ github.event.inputs.channel }}"

          if [ -n "$CHANNEL" ]; then
            # کدگذاری عبارت جستجو برای URL
            ENCODED_QUERY=$(python3 -c "import urllib.parse; print(urllib.parse.quote('${QUERY}'))")
            if [ "$PLATFORM" = "youtube" ]; then
              SEARCH_URL="https://www.youtube.com/@${CHANNEL}/search?query=${ENCODED_QUERY}"
            else
              SEARCH_URL="https://soundcloud.com/${CHANNEL}/search?q=${ENCODED_QUERY}"
            fi
            echo "🔎 جستجو در کانال/کاربر: $CHANNEL"
            echo "🔗 آدرس جستجو: $SEARCH_URL"
            yt-dlp --skip-download \
              --cookies cookies.txt \
              --playlist-end "$RESULTS" \
              --print "{ \
                \"title\": %(title)j, \
                \"url\": %(webpage_url)j, \
                \"uploader\": %(uploader)j, \
                \"duration\": \"%(duration>%H:%M:%S)s\", \
                \"upload_date\": \"%(upload_date)s\", \
                \"timestamp\": %(timestamp)r \
              }" \
              "$SEARCH_URL" 2>/dev/null |
            jq -s '
              sort_by(.timestamp // 0) | reverse
              | to_entries
              | map(.value + {index: (.key + 1)})
            ' > raw_results.json
          else
            if [ "$PLATFORM" = "youtube" ]; then
              PREFIX="ytsearch${RESULTS}"
            else
              PREFIX="scsearch${RESULTS}"
            fi
            yt-dlp --skip-download \
              --cookies cookies.txt \
              --print "{ \
                \"title\": %(title)j, \
                \"url\": %(webpage_url)j, \
                \"uploader\": %(uploader)j, \
                \"duration\": \"%(duration>%H:%M:%S)s\", \
                \"upload_date\": \"%(upload_date)s\", \
                \"timestamp\": %(timestamp)r \
              }" \
              "${PREFIX}:${QUERY}" 2>/dev/null |
            jq -s '
              sort_by(.timestamp // 0) | reverse
              | to_entries
              | map(.value + {index: (.key + 1)})
            ' > raw_results.json
          fi

          echo "✅ جستجو انجام شد. تعداد نتایج: $(jq length raw_results.json)"

      - name: 📆 تبدیل تاریخ‌ها به شمسی و زمان نسبی
        run: |
          pip install jdatetime
          python3 << 'EOF'
          import json
          from datetime import datetime, timezone
          import jdatetime

          with open('raw_results.json', 'r') as f:
              data = json.load(f)

          now = datetime.now(timezone.utc)

          for item in data:
              ts = item.get('timestamp')
              upload_date_str = item.get('upload_date', 'NA')
              if ts:
                  dt = datetime.fromtimestamp(ts, tz=timezone.utc)
                  upload_date_str = dt.strftime('%Y%m%d')
              if upload_date_str and upload_date_str != 'NA':
                  dt = datetime.strptime(upload_date_str, '%Y%m%d').replace(tzinfo=timezone.utc)
                  jdate = jdatetime.date.fromgregorian(date=dt.date())
                  persian_date = f"{jdate.day} {jdate.j_months_fa[jdate.month-1]} {jdate.year}"
                  gregorian_date = dt.strftime('%d %B %Y')
                  diff = now - dt
                  if diff.days == 0:
                      if diff.seconds < 3600:
                          relative = f"{diff.seconds // 60} دقیقه پیش"
                      else:
                          relative = f"{diff.seconds // 3600} ساعت پیش"
                  elif diff.days == 1:
                      relative = "دیروز"
                  elif diff.days < 30:
                      relative = f"{diff.days} روز پیش"
                  elif diff.days < 365:
                      relative = f"{diff.days // 30} ماه پیش"
                  else:
                      relative = f"{diff.days // 365} سال پیش"
                  item['upload_date_display'] = f"{gregorian_date} ({persian_date}) - {relative}"
              else:
                  item['upload_date_display'] = 'نامشخص'

          with open('search_results.json', 'w', encoding='utf-8') as f:
              json.dump(data, f, ensure_ascii=False, indent=2)

          print("✅ تاریخ‌ها تبدیل شدند:")
          for item in data:
              print(f"{item['index']}. {item['title']} - {item['upload_date_display']}")
          EOF

      - name: 🚀 ذخیره فایل JSON در مخزن
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add search_results.json
          git commit -m "📋 نتایج جستجوی ${{ github.event.inputs.platform }}: ${{ github.event.inputs.query }}" || echo "بدون تغییر"
          git push
