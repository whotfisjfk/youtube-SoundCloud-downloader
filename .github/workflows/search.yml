name: 🔍 جستجوی گوگل ویدیو و ساندکلاد

on:
  workflow_dispatch:
    inputs:
      platform:
        description: '🌐 پلتفرم'
        required: true
        default: 'youtube'
        type: choice
        options:
          - 'youtube'
          - 'soundcloud'
      query:
        description: '🔍 عبارت جستجو'
        required: true
      results:
        description: '📊 تعداد نتایج'
        required: false
        default: '10'

jobs:
  search:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 📥 دریافت فایل‌های مخزن
        uses: actions/checkout@v4

      - name: ⚙️ نصب yt‑dlp و jq
        uses: AnimMouse/setup-yt-dlp@v3
        with:
          ejs-node: true

      - name: 🔍 جستجو با yt-dlp و ذخیره نتایج
        run: |
          RESULTS="${{ github.event.inputs.results }}"
          QUERY="${{ github.event.inputs.query }}"
          PLATFORM="${{ github.event.inputs.platform }}"

          if [ "$PLATFORM" = "youtube" ]; then
            # جستجو در گوگل ویدیو برای یوتیوب
            SEARCH_TERM="gvsearch${RESULTS}:${QUERY}"
          else
            # جستجو در ساندکلاد
            SEARCH_TERM="scsearch${RESULTS}:${QUERY}"
          fi

          echo "🔍 در حال جستجو با yt-dlp برای: ${SEARCH_TERM}"

          # دریافت اطلاعات و ذخیره به صورت JSON
          yt-dlp --skip-download \
            --cookies cookies.txt \
            --print "{ \
              \"title\": %(title)j, \
              \"url\": %(webpage_url)j, \
              \"uploader\": %(uploader)j, \
              \"duration\": \"%(duration>%H:%M:%S)s\", \
              \"upload_date\": \"%(upload_date)s\", \
              \"timestamp\": %(timestamp)r \
            }" \
            "${SEARCH_TERM}" 2>/dev/null |
          jq -s '
            sort_by(.timestamp // 0) | reverse
            | to_entries
            | map(.value + {index: (.key + 1)})
          ' > raw_results.json

          echo "✅ جستجو انجام شد. تعداد نتایج: $(jq length raw_results.json)"

      - name: 📆 تبدیل تاریخ‌ها و تکمیل اطلاعات
        run: |
          pip install jdatetime
          python3 << 'EOF'
          import json
          from datetime import datetime, timezone
          import jdatetime

          # خواندن فایل raw_results.json
          with open('raw_results.json', 'r') as f:
              data = json.load(f)

          now = datetime.now(timezone.utc)

          for item in data:
              upload_date_str = item.get('upload_date', 'NA')
              timestamp = item.get('timestamp', None)

              if upload_date_str and upload_date_str != 'NA':
                  dt = datetime.strptime(upload_date_str, '%Y%m%d').replace(tzinfo=timezone.utc)
                  jdate = jdatetime.date.fromgregorian(date=dt.date())
                  persian_date = f"{jdate.day} {jdate.j_months_fa[jdate.month-1]} {jdate.year}"
                  gregorian_date = dt.strftime('%d %B %Y')
                  diff = now - dt
                  if diff.days == 0:
                      if diff.seconds < 3600:
                          relative_time = f"{diff.seconds // 60} دقیقه پیش"
                      else:
                          relative_time = f"{diff.seconds // 3600} ساعت پیش"
                  elif diff.days == 1:
                      relative_time = "دیروز"
                  elif diff.days < 30:
                      relative_time = f"{diff.days} روز پیش"
                  elif diff.days < 365:
                      relative_time = f"{diff.days // 30} ماه پیش"
                  else:
                      relative_time = f"{diff.days // 365} سال پیش"
                  item['upload_date_display'] = f"{gregorian_date} ({persian_date}) - {relative_time}"
              elif timestamp and timestamp is not None:
                  dt = datetime.fromtimestamp(timestamp, tz=timezone.utc)
                  jdate = jdatetime.date.fromgregorian(date=dt.date())
                  persian_date = f"{jdate.day} {jdate.j_months_fa[jdate.month-1]} {jdate.year}"
                  gregorian_date = dt.strftime('%d %B %Y')
                  diff = now - dt
                  if diff.days == 0:
                      if diff.seconds < 3600:
                          relative_time = f"{diff.seconds // 60} دقیقه پیش"
                      else:
                          relative_time = f"{diff.seconds // 3600} ساعت پیش"
                  elif diff.days == 1:
                      relative_time = "دیروز"
                  elif diff.days < 30:
                      relative_time = f"{diff.days} روز پیش"
                  elif diff.days < 365:
                      relative_time = f"{diff.days // 30} ماه پیش"
                  else:
                      relative_time = f"{diff.days // 365} سال پیش"
                  item['upload_date_display'] = f"{gregorian_date} ({persian_date}) - {relative_time}"
              else:
                  item['upload_date_display'] = 'نامشخص'

          # ذخیره فایل نهایی
          with open('search_results.json', 'w') as f:
              json.dump(data, f, ensure_ascii=False, indent=2)

          print("✅ تاریخ‌ها تبدیل شدند:")
          for item in data:
              print(f"{item['index']}. {item['title']} - {item['upload_date_display']}")
          EOF

      - name: 🚀 ذخیره فایل JSON در مخزن
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add search_results.json
          git commit -m "📋 نتایج جستجوی ${{ github.event.inputs.platform }}: ${{ github.event.inputs.query }}" || echo "بدون تغییر"
          git push
