name: 🔍 جستجوی یوتیوب و ساندکلاد (مرتب‌شده بر اساس جدیدترین)

on:
  workflow_dispatch:
    inputs:
      platform:
        description: '🌐 پلتفرم'
        required: true
        default: 'youtube'
        type: choice
        options:
          - 'youtube'
          - 'soundcloud'
      query:
        description: '🔍 عبارت جستجو'
        required: true
      results:
        description: '📊 تعداد نتایج (حداکثر ۲۰)'
        required: false
        default: '10'

jobs:
  search:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 📥 دریافت فایل‌های مخزن
        uses: actions/checkout@v4

      - name: ⚙️ نصب yt‑dlp و jq
        uses: AnimMouse/setup-yt-dlp@v3
        with:
          ejs-node: true

      - name: 🔍 جستجو، مرتب‌سازی و ذخیره‌سازی JSON
        run: |
          RESULTS="${{ github.event.inputs.results }}"
          QUERY="${{ github.event.inputs.query }}"
          PLATFORM="${{ github.event.inputs.platform }}"

          if [ "$PLATFORM" = "youtube" ]; then
            PREFIX="ytsearch${RESULTS}"
          else
            PREFIX="scsearch${RESULTS}"
          fi

          # دریافت نتایج خام و تبدیل به آرایه‌ای از اشیاء
          yt-dlp --flat-playlist -s \
            --cookies cookies.txt \
            --print "{ \
              \"title\": %(title)j, \
              \"url\": %(webpage_url)j, \
              \"uploader\": %(uploader)j, \
              \"duration\": \"%(duration>%H:%M:%S)s\", \
              \"upload_date\": \"%(upload_date)s\" \
            }" \
            "${PREFIX}:${QUERY}" 2>/dev/null |
          jq -s '
            # مرتب‌سازی نزولی بر اساس تاریخ (جدیدترین اول)
            sort_by(.upload_date // "00000000") | reverse
            # افزودن شماره ردیف جدید (از ۱)
            | to_entries
            | map(.value + {index: (.key + 1)})
          ' > search_results.json

          # نمایش خلاصه در لاگ
          echo "✅ جستجو انجام شد. تعداد نتایج: $(jq length search_results.json)"
          jq -r '.[] | "\(.index). \(.title) [آپلود: \(.upload_date // "نامشخص")] (\(.duration))"' search_results.json

      - name: 🚀 ذخیره فایل JSON در مخزن
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add search_results.json
          git commit -m "📋 نتایج جستجوی ${{ github.event.inputs.platform }}: ${{ github.event.inputs.query }}" || echo "بدون تغییر"
          git push
