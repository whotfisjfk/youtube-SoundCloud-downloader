name: 🔍 جستجوی گوگل برای یوتیوب و ساندکلاد

on:
  workflow_dispatch:
    inputs:
      platform:
        description: '🌐 پلتفرم'
        required: true
        default: 'youtube'
        type: choice
        options:
          - 'youtube'
          - 'soundcloud'
      query:
        description: '🔍 عبارت جستجو'
        required: true
      results:
        description: '📊 تعداد نتایج (حداکثر ۱۰)'
        required: false
        default: '10'

jobs:
  search:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 📥 دریافت فایل‌های مخزن
        uses: actions/checkout@v4

      - name: 🐍 نصب پایتون و کتابخانه‌های مورد نیاز
        run: |
          python -m pip install --upgrade pip
          pip install jdatetime search-engine-parser requests beautifulsoup4

      - name: 🔍 جستجوی گوگل و استخراج لینک‌ها
        run: |
          python3 << 'EOF'
          import json
          from search_engine_parser import GoogleSearch

          PLATFORM = "${{ github.event.inputs.platform }}"
          QUERY = "${{ github.event.inputs.query }}"
          RESULTS = int("${{ github.event.inputs.results }}")

          # تعیین دامنه برای جستجو
          if PLATFORM == "youtube":
              search_query = f"site:youtube.com {QUERY}"
          else:
              search_query = f"site:soundcloud.com {QUERY}"

          print(f"🔍 در حال جستجوی گوگل برای: {search_query}")
          
          # انجام جستجو
          try:
              google_search = GoogleSearch()
              gresults = google_search.search(search_query, num_results=RESULTS)
          except Exception as e:
              print(f"❌ خطا در جستجوی گوگل: {e}")
              exit(1)

          # استخراج و پردازش نتایج
          output = []
          index = 1
          for item in gresults:
              # استخراج عنوان، لینک و توضیحات
              title = item.get('title', 'بدون عنوان')
              url = item.get('link', '')
              description = item.get('description', '')
              
              if not url:
                  continue
                  
              # اطمینان از اینکه لینک مربوط به دامنه مورد نظر است
              if PLATFORM == "youtube" and "youtube.com" in url:
                  pass
              elif PLATFORM == "soundcloud" and "soundcloud.com" in url:
                  pass
              else:
                  # اگر لینک ناخواسته بود، نادیده گرفته شود
                  continue

              # تلاش برای استخراج تاریخ (در صورت وجود در توضیحات)
              # توجه: این بخش تقریبی است و ممکن است همیشه دقیق نباشد
              upload_date_display = "نامشخص"

              output.append({
                  "index": index,
                  "title": title,
                  "url": url,
                  "uploader": "",
                  "duration": "",
                  "upload_date": "NA",
                  "upload_date_display": upload_date_display,
                  "description": description
              })
              index += 1

          # ذخیره نتایج
          with open('search_results.json', 'w', encoding='utf-8') as f:
              json.dump(output, f, ensure_ascii=False, indent=2)

          print(f"✅ جستجو انجام شد. تعداد نتایج: {len(output)}")
          for item in output:
              print(f"{item['index']}. {item['title']} - {item['url']}")
          EOF

      - name: 📆 تکمیل اطلاعات و تاریخ‌ها با yt-dlp (اختیاری)
        run: |
          # برای دریافت دقیق تاریخ آپلود و سایر اطلاعات، می‌توانیم از yt-dlp استفاده کنیم
          pip install yt-dlp
          python3 << 'EOF'
          import json
          import subprocess
          import sys

          with open('search_results.json', 'r') as f:
              results = json.load(f)

          for item in results:
              url = item['url']
              if not url:
                  continue
              try:
                  # دستور yt-dlp برای دریافت اطلاعات بدون دانلود
                  cmd = [
                      'yt-dlp', '--skip-download', '--print-json',
                      '--no-playlist', url
                  ]
                  process = subprocess.run(cmd, capture_output=True, text=True, timeout=15)
                  if process.returncode == 0:
                      info = json.loads(process.stdout)
                      item['title'] = info.get('title', item['title'])
                      item['uploader'] = info.get('uploader', '')
                      item['duration'] = str(info.get('duration', ''))
                      upload_date = info.get('upload_date', 'NA')
                      item['upload_date'] = upload_date
                      if upload_date and upload_date != 'NA':
                          # تبدیل ساده تاریخ میلادی به شمسی
                          import jdatetime
                          from datetime import datetime, timezone
                          dt = datetime.strptime(upload_date, '%Y%m%d').replace(tzinfo=timezone.utc)
                          jdate = jdatetime.date.fromgregorian(date=dt.date())
                          persian_date = f"{jdate.day} {jdate.j_months_fa[jdate.month-1]} {jdate.year}"
                          gregorian_date = dt.strftime('%d %B %Y')
                          # محاسبه زمان نسبی
                          now = datetime.now(timezone.utc)
                          diff = now - dt
                          if diff.days == 0:
                              if diff.seconds < 3600:
                                  relative_time = f"{diff.seconds // 60} دقیقه پیش"
                              else:
                                  relative_time = f"{diff.seconds // 3600} ساعت پیش"
                          elif diff.days == 1:
                              relative_time = "دیروز"
                          elif diff.days < 30:
                              relative_time = f"{diff.days} روز پیش"
                          elif diff.days < 365:
                              relative_time = f"{diff.days // 30} ماه پیش"
                          else:
                              relative_time = f"{diff.days // 365} سال پیش"
                          item['upload_date_display'] = f"{gregorian_date} ({persian_date}) - {relative_time}"
                      else:
                          item['upload_date_display'] = 'نامشخص'
                  else:
                      print(f"⚠️ خطا در دریافت اطلاعات برای {url}")
              except Exception as e:
                  print(f"⚠️ خطا در پردازش {url}: {e}")

          with open('search_results.json', 'w') as f:
              json.dump(results, f, ensure_ascii=False, indent=2)

          print("✅ اطلاعات تکمیلی با موفقیت دریافت و به‌روزرسانی شد.")
          for item in results:
              print(f"{item['index']}. {item['title']} - {item['upload_date_display']}")
          EOF

      - name: 🚀 ذخیره فایل JSON در مخزن
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add search_results.json
          git commit -m "📋 نتایج جستجوی گوگل برای: ${{ github.event.inputs.query }}" || echo "بدون تغییر"
          git push
