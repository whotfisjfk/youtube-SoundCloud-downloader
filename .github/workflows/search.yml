name: 🔍 جستجوی یوتیوب و ساندکلاد (با تاریخ واقعی)

on:
  workflow_dispatch:
    inputs:
      platform:
        description: '🌐 پلتفرم'
        required: true
        default: 'youtube'
        type: choice
        options:
          - 'youtube'
          - 'soundcloud'
      query:
        description: '🔍 عبارت جستجو'
        required: true
      results:
        description: '📊 تعداد نتایج (حداکثر ۱۰)'
        required: false
        default: '10'

jobs:
  search:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 📥 دریافت فایل‌های مخزن
        uses: actions/checkout@v4

      - name: ⚙️ نصب yt‑dlp و jq
        uses: AnimMouse/setup-yt-dlp@v3
        with:
          ejs-node: true
          # (کتابخانه jq به‌طور پیش‌فرض روی runner هست)

      - name: 🔍 جستجو با جزئیات کامل و مرتب‌سازی
        run: |
          RESULTS="${{ github.event.inputs.results }}"
          QUERY="${{ github.event.inputs.query }}"
          PLATFORM="${{ github.event.inputs.platform }}"

          if [ "$PLATFORM" = "youtube" ]; then
            PREFIX="ytsearch${RESULTS}"
            # دریافت اطلاعات کامل بدون دانلود (--skip-download)
            yt-dlp --skip-download \
              --cookies cookies.txt \
              --print "{ \
                \"title\": %(title)j, \
                \"url\": %(webpage_url)j, \
                \"uploader\": %(uploader)j, \
                \"duration\": \"%(duration>%H:%M:%S)s\", \
                \"upload_date\": \"%(upload_date)s\", \
                \"timestamp\": %(timestamp)r \
              }" \
              "${PREFIX}:${QUERY}" 2>/dev/null |
            jq -s '
              sort_by(.timestamp // 0) | reverse
              | to_entries
              | map(.value + {index: (.key + 1)})
            ' > search_results.json

          else
            PREFIX="scsearch${RESULTS}"
            yt-dlp --skip-download \
              --print "{ \
                \"title\": %(title)j, \
                \"url\": %(webpage_url)j, \
                \"uploader\": %(uploader)j, \
                \"duration\": \"%(duration>%H:%M:%S)s\", \
                \"upload_date\": \"%(upload_date)s\", \
                \"timestamp\": %(timestamp)r \
              }" \
              "${PREFIX}:${QUERY}" 2>/dev/null |
            jq -s '
              sort_by(.timestamp // 0) | reverse
              | to_entries
              | map(.value + {index: (.key + 1)})
            ' > search_results.json
          fi

          # نمایش خلاصه در لاگ
          echo "✅ جستجو انجام شد. تعداد نتایج: $(jq length search_results.json)"
          jq -r '.[] | "\(.index). \(.title) [آپلود: \(.upload_date // "نامشخص")] (\(.duration))"' search_results.json

      - name: 🚀 ذخیره فایل JSON در مخزن
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add search_results.json
          git commit -m "📋 نتایج جستجوی ${{ github.event.inputs.platform }}: ${{ github.event.inputs.query }}" || echo "بدون تغییر"
          git push
