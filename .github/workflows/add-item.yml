name: Add Watch Item

on:
  workflow_dispatch:
    inputs:
      channel_id:
        description: 'شناسه کانال (UC...)'
        required: true
        type: string
      title_keyword:
        description: 'کلیدواژه ثابت در عنوان ویدیو'
        required: true
        type: string
      start_time_iran:
        description: 'ساعت شروع به وقت ایران (HH:MM)'
        required: true
        type: string
        default: '19:00'
      check_every_minutes:
        description: 'فاصلهٔ بین تلاش‌ها (دقیقه)'
        required: false
        type: number
        default: 60
      max_attempts:
        description: 'حداکثر تلاش در روز'
        required: false
        type: number
        default: 5

jobs:
  add:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Append new item to watchlist.json
        env:
          CHANNEL_ID: ${{ github.event.inputs.channel_id }}
          TITLE_KEYWORD: ${{ github.event.inputs.title_keyword }}
          START_TIME: ${{ github.event.inputs.start_time_iran }}
          INTERVAL: ${{ github.event.inputs.check_every_minutes }}
          ATTEMPTS: ${{ github.event.inputs.max_attempts }}
        run: |
          NEW_ITEM=$(jq -n \
            --arg cid "$CHANNEL_ID" \
            --arg kw "$TITLE_KEYWORD" \
            --arg st "$START_TIME" \
            --argjson iv "$INTERVAL" \
            --argjson ma "$ATTEMPTS" \
            '{channel_id: $cid, title_keyword: $kw, start_time_iran: $st, check_every_minutes: $iv, max_attempts: $ma}')
          if [ -f watchlist.json ]; then
            jq ". += [$NEW_ITEM]" watchlist.json > tmp.json && mv tmp.json watchlist.json
          else
            echo "[$NEW_ITEM]" > watchlist.json
          fi
          echo "محتویات جدید:"
          cat watchlist.json

      - name: Commit updated watchlist
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add watchlist.json
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "Add new watch item via form"
            git push
          fi
