name: 🎬🎵new-2-Multi-Platform Downloader (YouTube + SoundCloud + Split Large Videos)

on:
  workflow_dispatch:
    inputs:
      platform:
        description: '🌐 پلتفرم'
        required: true
        default: 'youtube'
        type: choice
        options:
          - 'youtube'
          - 'soundcloud'
      url:
        description: '🔗 لینک ویدئو / آهنگ'
        required: true
      format:
        description: '🎬 خروجی'
        required: true
        default: 'video'
        type: choice
        options:
          - 'video'
          - 'audio'
      folder:
        description: '📁 پوشهٔ موقت دانلود'
        required: false
        default: 'downloads'

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 📥 دریافت فایل‌های مخزن
        uses: actions/checkout@v4

      - name: 🔧 نصب ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: ⚙️ نصب yt‑dlp با پشتیبانی از چالش‌های JavaScript
        uses: AnimMouse/setup-yt-dlp@v3
        with:
          ejs-node: true
          aria2: true

      - name: 🧹 پاکسازی پوشهٔ دانلود
        run: rm -rf "${{ github.event.inputs.folder }}"/*

      # ================= YouTube =================
      - name: ▶️ یوتیوب | دانلود ویدئو (MP4)
        if: github.event.inputs.platform == 'youtube' && github.event.inputs.format == 'video'
        run: |
          mkdir -p "${{ github.event.inputs.folder }}"
          yt-dlp -f "bestvideo[height<=1080]+bestaudio/best[height<=1080]" \
            --merge-output-format mp4 \
            --cookies cookies.txt \
            --force-overwrites \
            "${{ github.event.inputs.url }}" \
            -o "${{ github.event.inputs.folder }}/%(title)s.%(ext)s"

      - name: ▶️ یوتیوب | دانلود صوت (MP3)
        if: github.event.inputs.platform == 'youtube' && github.event.inputs.format == 'audio'
        run: |
          mkdir -p "${{ github.event.inputs.folder }}"
          yt-dlp -f "bestaudio[ext=m4a]/bestaudio/best" \
            --audio-format mp3 \
            --audio-quality 0 \
            --cookies cookies.txt \
            --force-overwrites \
            --no-playlist \
            "${{ github.event.inputs.url }}" \
            -o "${{ github.event.inputs.folder }}/%(title)s.%(ext)s"

      # ================= SoundCloud =================
      - name: ☁️ ساندکلاد | دانلود صوت (MP3)
        if: github.event.inputs.platform == 'soundcloud' && github.event.inputs.format == 'audio'
        run: |
          mkdir -p "${{ github.event.inputs.folder }}"
          yt-dlp -x --audio-format mp3 --audio-quality 0 \
            --no-playlist \
            --force-ipv4 \
            "${{ github.event.inputs.url }}" \
            -o "${{ github.event.inputs.folder }}/%(title)s.%(ext)s"

      - name: ☁️ ساندکلاد | دانلود ویدئو (در صورت وجود)
        if: github.event.inputs.platform == 'soundcloud' && github.event.inputs.format == 'video'
        run: |
          mkdir -p "${{ github.event.inputs.folder }}"
          yt-dlp -f bestvideo+bestaudio/best --merge-output-format mp4 \
            --no-playlist \
            "${{ github.event.inputs.url }}" \
            -o "${{ github.event.inputs.folder }}/%(title)s.%(ext)s"

      # ================= تقسیم فایل‌های حجیم (> 90MB) =================
      - name: ✂️ تقسیم ویدئوهای بزرگ به قطعات ۹۰ مگابایتی
        id: split
        run: |
          CHUNK_SIZE=90M
          FOLDER="${{ github.event.inputs.folder }}"
          shopt -s nullglob
          for video in "$FOLDER"/*.mp4; do
            SIZE=$(stat -c%s "$video")
            if [ "$SIZE" -gt 94371840 ]; then   # 90 * 1024 * 1024 = 94371840 bytes
              BASENAME=$(basename "$video" .mp4)
              SUBDIR="$FOLDER/${BASENAME}_parts"
              mkdir -p "$SUBDIR"
              echo "تقسیم فایل $video ($(numfmt --to=iec $SIZE)) به قطعات $CHUNK_SIZE ..."
              split -d -b $CHUNK_SIZE "$video" "$SUBDIR/part"
              # ایجاد اسکریپت ادغام برای ویندوز و لینوکس
              echo "@echo off" > "$SUBDIR/merge.bat"
              echo "copy /b part* \"../${BASENAME}.mp4\"" >> "$SUBDIR/merge.bat"
              echo "echo فایل ترکیب شد: ../${BASENAME}.mp4" >> "$SUBDIR/merge.bat"
              echo '#!/bin/bash' > "$SUBDIR/merge.sh"
              echo "cat part* > \"../${BASENAME}.mp4\"" >> "$SUBDIR/merge.sh"
              echo "echo فایل ترکیب شد: ../${BASENAME}.mp4" >> "$SUBDIR/merge.sh"
              chmod +x "$SUBDIR/merge.sh"
              # حذف فایل اصلی بزرگ
              rm "$video"
            fi
          done

      # ================= ذخیره در مخزن (بدون LFS) =================
      - name: 🚀 ثبت فایل‌ها در مخزن (بدون LFS)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ github.event.inputs.folder }}"
          git commit -m "افزودن فایل از ${{ github.event.inputs.platform }}" || echo "هیچ فایل جدیدی نیست"
          git push

      # ================= انتشار در Release (فقط برای فایل‌های کوچک/تک‌بخشی) =================
      - name: 📦 انتشار در Release (اگر فایل شکسته نشده باشد)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # پیدا کردن یک فایل منفرد (mp3 یا mp4) که در پوشه اصلی باقی مانده (بدون زیرپوشه)
          FILE=$(find "${{ github.event.inputs.folder }}" -maxdepth 1 -type f \( -name "*.mp3" -o -name "*.mp4" \) 2>/dev/null | head -1)
          if [ -z "$FILE" ]; then
            echo "فایل بزرگ شکسته شده است؛ از Release صرف‌نظر می‌شود."
            echo "مستقیماً از پوشهٔ '${{ github.event.inputs.folder }}' دانلود کنید."
            exit 0
          fi
          if [ ! -f "$FILE" ]; then
            exit 0
          fi
          echo "آپلود فایل یکپارچه: $FILE"
          if gh release view latest &> /dev/null; then
            gh release upload latest "$FILE" --clobber
          else
            gh release create latest "$FILE" \
              --title "مجموعه دانلودهای چندمنظوره" \
              --notes "فایل‌های دانلود شده از یوتیوب و ساندکلاد (در صورت عدم نیاز به شکستن) اینجا قرار می‌گیرند."
          fi
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/latest"
          echo "📎 لینک Release: $RELEASE_URL"
