name: рҹҺ¬рҹҺө NEW3-Multi-Platform Downloader (YouTube + SoundCloud + Split + Repo + Files.ir)

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'рҹҢҗ ЩҫЩ„ШӘЩҒШұЩ…'
        required: true
        default: 'youtube'
        type: choice
        options:
          - 'youtube'
          - 'soundcloud'
      url:
        description: 'рҹ”— Щ„ЫҢЩҶЪ© ЩҲЫҢШҜШҰЩҲ / ШўЩҮЩҶЪҜ'
        required: true
      format:
        description: 'рҹҺ¬ Ш®ШұЩҲШ¬ЫҢ'
        required: true
        default: 'video'
        type: choice
        options:
          - 'video'
          - 'audio'
      folder:
        description: 'рҹ“Ғ ЩҫЩҲШҙЩҮЩ” Ш°Ш®ЫҢШұЩҮ (ЩҮЩ… ШҜШұ Щ…Ш®ШІЩҶ ЩҮЩ… Щ…ЩҲЩӮШӘ)'
        required: false
        default: 'downloads'

jobs:
  download-upload-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: рҹ“Ҙ ШҜШұЫҢШ§ЩҒШӘ ЩҒШ§ЫҢЩ„вҖҢЩҮШ§ЫҢ Щ…Ш®ШІЩҶ
        uses: actions/checkout@v4

      - name: рҹ”§ ЩҶШөШЁ ffmpegШҢ zip ЩҲ jq
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg zip jq

      - name: вҡҷпёҸ ЩҶШөШЁ ytвҖ‘dlp ШЁШ§ ЩҫШҙШӘЫҢШЁШ§ЩҶЫҢ Ш§ШІ ЪҶШ§Щ„ШҙвҖҢЩҮШ§ЫҢ JavaScript
        uses: AnimMouse/setup-yt-dlp@v3
        with:
          ejs-node: true
          aria2: true

      - name: рҹ§№ ЩҫШ§Ъ©ШіШ§ШІЫҢ ЩҫЩҲШҙЩҮЩ” ШҜШ§ЩҶЩ„ЩҲШҜ (ШЁШұШ§ЫҢ Ш¬Щ„ЩҲЪҜЫҢШұЫҢ Ш§ШІ ШҙЩ„ЩҲШәЫҢ Щ…Ш®ШІЩҶ)
        run: rm -rf "${{ github.event.inputs.folder }}" && mkdir -p "${{ github.event.inputs.folder }}"

      # ================= YouTube =================
      - name: в–¶пёҸ ЫҢЩҲШӘЫҢЩҲШЁ | ШҜШ§ЩҶЩ„ЩҲШҜ ЩҲЫҢШҜШҰЩҲ (MP4)
        if: github.event.inputs.platform == 'youtube' && github.event.inputs.format == 'video'
        run: |
          yt-dlp -f "bestvideo[height<=1080]+bestaudio/best[height<=1080]" \
            --merge-output-format mp4 \
            --cookies cookies.txt \
            --force-overwrites \
            "${{ github.event.inputs.url }}" \
            -o "${{ github.event.inputs.folder }}/%(title)s.%(ext)s"

      - name: в–¶пёҸ ЫҢЩҲШӘЫҢЩҲШЁ | ШҜШ§ЩҶЩ„ЩҲШҜ ШөЩҲШӘ (MP3)
        if: github.event.inputs.platform == 'youtube' && github.event.inputs.format == 'audio'
        run: |
          yt-dlp -f "bestaudio[ext=m4a]/bestaudio/best" \
            --audio-format mp3 \
            --audio-quality 0 \
            --cookies cookies.txt \
            --force-overwrites \
            --no-playlist \
            "${{ github.event.inputs.url }}" \
            -o "${{ github.event.inputs.folder }}/%(title)s.%(ext)s"

      # ================= SoundCloud =================
      - name: вҳҒпёҸ ШіШ§ЩҶШҜЪ©Щ„Ш§ШҜ | ШҜШ§ЩҶЩ„ЩҲШҜ ШөЩҲШӘ (MP3)
        if: github.event.inputs.platform == 'soundcloud' && github.event.inputs.format == 'audio'
        run: |
          yt-dlp -x --audio-format mp3 --audio-quality 0 \
            --no-playlist \
            --force-ipv4 \
            "${{ github.event.inputs.url }}" \
            -o "${{ github.event.inputs.folder }}/%(title)s.%(ext)s"

      - name: вҳҒпёҸ ШіШ§ЩҶШҜЪ©Щ„Ш§ШҜ | ШҜШ§ЩҶЩ„ЩҲШҜ ЩҲЫҢШҜШҰЩҲ (ШҜШұ ШөЩҲШұШӘ ЩҲШ¬ЩҲШҜ)
        if: github.event.inputs.platform == 'soundcloud' && github.event.inputs.format == 'video'
        run: |
          yt-dlp -f bestvideo+bestaudio/best --merge-output-format mp4 \
            --no-playlist \
            "${{ github.event.inputs.url }}" \
            -o "${{ github.event.inputs.folder }}/%(title)s.%(ext)s"

      # ================= ШЁШіШӘЩҮвҖҢШЁЩҶШҜЫҢ ЩҲЫҢШҜШҰЩҲЩҮШ§ЫҢ ШЁШІШұЪҜ ШЁЩҮ ZIP ЪҶЩҶШҜШЁШ®ШҙЫҢ =================
      - name: вңӮпёҸ ШӘШЁШҜЫҢЩ„ ЩҲЫҢШҜШҰЩҲЩҮШ§ЫҢ ШЁШІШұЪҜ ШЁЩҮ ZIP ЪҶЩҶШҜШЁШ®ШҙЫҢ
        run: |
          FOLDER="${{ github.event.inputs.folder }}"
          for video in "$FOLDER"/*.mp4; do
            [ -e "$video" ] || continue
            SIZE=$(stat -c%s "$video")
            if [ "$SIZE" -gt 94371840 ]; then   # ШЁШІШұЪҜШӘШұ Ш§ШІ 90MB
              BASENAME=$(basename "$video" .mp4)
              ZIPNAME="$FOLDER/${BASENAME}.zip"
              echo "рҹ“Ұ ШЁШіШӘЩҮвҖҢШЁЩҶШҜЫҢ $video ($(numfmt --to=iec $SIZE)) ШҜШұ $ZIPNAME ..."
              zip -s 90m -j "$ZIPNAME" "$video"
              rm "$video"
              echo "вң… ЩҒШ§ЫҢЩ„ ШЁЩҮ ЩӮШ·Ш№Ш§ШӘ ZIP ШӘЩӮШіЫҢЩ… ШҙШҜ. ШЁШұШ§ЫҢ ШЁШ§ШІЫҢШ§ШЁЫҢШҢ ЩҮЩ…ЩҮЩ” ЩӮШ·Ш№Ш§ШӘ ШұШ§ ШҜШ§ЩҶЩ„ЩҲШҜ Ъ©ШұШҜЩҮ ЩҲ ЩҒШ§ЫҢЩ„ .zip ШұШ§ ШЁШ§ WinRAR ШЁШ§ШІ Ъ©ЩҶЫҢШҜ." > "$FOLDER/${BASENAME}_README.txt"
            fi
          done

      # ================= ШӘШіШӘ Ш§ШӘШөШ§Щ„ ШЁЩҮ API (Ш§Ш®ШӘЫҢШ§ШұЫҢ Ш§Щ…Ш§ Щ…ЩҒЫҢШҜ) =================
      - name: рҹ”Ң ШӘШіШӘ Ш§ШӘШөШ§Щ„ ШЁЩҮ Files.ir API
        env:
          FILESIR_TOKEN: ${{ secrets.FILESIR_TOKEN }}
        run: |
          echo "ШҜШұ ШӯШ§Щ„ ШЁШұШұШіЫҢ ЩҒШ¶Ш§ЫҢ Ш°Ш®ЫҢШұЩҮвҖҢШіШ§ШІЫҢ..."
          RESPONSE=$(curl -s -X GET "https://my.files.ir/api/user/space-usage" \
            -H "Authorization: Bearer $FILESIR_TOKEN")
          STATUS=$(echo "$RESPONSE" | jq -r '.status')
          if [ "$STATUS" != "success" ]; then
            echo "вқҢ Ш®Ш·Ш§ ШҜШұ Ш§ШұШӘШЁШ§Ш· ШЁШ§ API: $RESPONSE"
            exit 1
          fi
          echo "вң… Ш§ШӘШөШ§Щ„ ШЁШұЩӮШұШ§Шұ Ш§ШіШӘ. ЩҒШ¶Ш§ЫҢ ШЁШ§ЩӮЫҢвҖҢЩ…Ш§ЩҶШҜЩҮ: $(echo "$RESPONSE" | jq -r '.remaining') ШЁШ§ЫҢШӘ"

      # ================= ШўЩҫЩ„ЩҲШҜ ШұЩҲЫҢ Files.ir (Ш§ШЁШұ) =================
      - name: рҹ“Ө ШўЩҫЩ„ЩҲШҜ ЩҮЩ…ЩҮ ЩҒШ§ЫҢЩ„вҖҢЩҮШ§ЫҢ ЩҫЩҲШҙЩҮ ШЁЩҮ Files.ir
        env:
          FILESIR_TOKEN: ${{ secrets.FILESIR_TOKEN }}
        run: |
          FOLDER="${{ github.event.inputs.folder }}"
          if [ ! -d "$FOLDER" ] || [ -z "$(ls -A $FOLDER)" ]; then
            echo "вҡ пёҸ ЩҫЩҲШҙЩҮ Ш®Ш§Щ„ЫҢ Ш§ШіШӘШҢ ЪҶЫҢШІЫҢ ШЁШұШ§ЫҢ ШўЩҫЩ„ЩҲШҜ ЩҲШ¬ЩҲШҜ ЩҶШҜШ§ШұШҜ."
            exit 0
          fi

          for file in "$FOLDER"/*; do
            [ -e "$file" ] || continue
            echo "вҸ« ШўЩҫЩ„ЩҲШҜ: $(basename "$file")"
            UPLOAD_RESPONSE=$(curl -s -X POST "https://my.files.ir/api/uploads" \
              -H "Authorization: Bearer $FILESIR_TOKEN" \
              -F "file=@$file" \
              -F "parentId=null" \
              -F "workspaceId=0")
            STATUS=$(echo "$UPLOAD_RESPONSE" | jq -r '.status')
            if [ "$STATUS" == "success" ]; then
              FILE_ID=$(echo "$UPLOAD_RESPONSE" | jq -r '.fileEntry.id')
              echo "вң… ШўЩҫЩ„ЩҲШҜ ШҙШҜ: $(basename "$file") (ID: $FILE_ID)"
            else
              echo "вқҢ Ш®Ш·Ш§ ШҜШұ ШўЩҫЩ„ЩҲШҜ $(basename "$file"): $UPLOAD_RESPONSE"
              exit 1
            fi
          done

      # ================= Ш°Ш®ЫҢШұЩҮ ЩҒШ§ЫҢЩ„вҖҢЩҮШ§ ШҜШұ Щ…Ш®ШІЩҶ ЪҜЫҢШӘвҖҢЩҮШ§ШЁ =================
      - name: рҹҡҖ Ш«ШЁШӘ ЩҒШ§ЫҢЩ„вҖҢЩҮШ§ ШҜШұ Щ…Ш®ШІЩҶ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ github.event.inputs.folder }}"
          git commit -m "Ш§ЩҒШІЩҲШҜЩҶ ЩҒШ§ЫҢЩ„ Ш§ШІ ${{ github.event.inputs.platform }}" || echo "ЩҮЫҢЪҶ ЩҒШ§ЫҢЩ„ Ш¬ШҜЫҢШҜЫҢ ЩҶЫҢШіШӘ"
          git push

      # ================= Ш§ЩҶШӘШҙШ§Шұ ШҜШұ Release (ЩҒЩӮШ· ШЁШұШ§ЫҢ ЩҒШ§ЫҢЩ„вҖҢЩҮШ§ЫҢ ЫҢЪ©ЩҫШ§ШұЪҶЩҮ) =================
      - name: рҹ“Ұ Ш§ЩҶШӘШҙШ§Шұ ШҜШұ Release (ЩҒШ§ЫҢЩ„вҖҢЩҮШ§ЫҢ Ъ©ЩҲЪҶЪ©)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FILE=$(find "${{ github.event.inputs.folder }}" -maxdepth 1 -type f \( -name "*.mp3" -o -name "*.mp4" \) 2>/dev/null | head -1)
          if [ -z "$FILE" ]; then
            echo "ЩҒШ§ЫҢЩ„ ШҙЪ©ШіШӘЩҮ ШҙШҜЩҮ Ш§ШіШӘШӣ Ш§ШІ Release ШөШұЩҒвҖҢЩҶШёШұ Щ…ЫҢвҖҢШҙЩҲШҜ. ЩӮШ·Ш№Ш§ШӘ ШұШ§ Ш§ШІ ЩҫЩҲШҙЩҮ ШҜШ§ЩҶЩ„ЩҲШҜ Ъ©ЩҶЫҢШҜ."
            exit 0
          fi
          echo "ШўЩҫЩ„ЩҲШҜ ЩҒШ§ЫҢЩ„ ЫҢЪ©ЩҫШ§ШұЪҶЩҮ: $FILE"
          if gh release view latest &> /dev/null; then
            gh release upload latest "$FILE" --clobber
          else
            gh release create latest "$FILE" \
              --title "Щ…Ш¬Щ…ЩҲШ№ЩҮ ШҜШ§ЩҶЩ„ЩҲШҜЩҮШ§ЫҢ ЪҶЩҶШҜЩ…ЩҶШёЩҲШұЩҮ" \
              --notes "ЩҒШ§ЫҢЩ„вҖҢЩҮШ§ЫҢ ЫҢЪ©ЩҫШ§ШұЪҶЩҮ (ШІЫҢШұ 90MB) Ш§ЫҢЩҶШ¬Ш§ ЩӮШұШ§Шұ Щ…ЫҢвҖҢЪҜЫҢШұЩҶШҜ."
          fi
          echo "рҹ“Һ Щ„ЫҢЩҶЪ© Release: https://github.com/${{ github.repository }}/releases/tag/latest"
