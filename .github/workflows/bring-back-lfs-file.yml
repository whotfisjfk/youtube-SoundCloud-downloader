name: 🔄 Replace LFS file with normal file (MP3)

on:
  workflow_dispatch:
    inputs:
      filepath:
        description: 'مسیر دقیق فایل LFS که می‌خواهید جایگزین شود (از ریشهٔ مخزن)'
        required: true
      keep_as_mp3:
        description: 'تبدیل به MP3 و ذخیره با پسوند mp3؟'
        required: false
        default: 'yes'
        type: choice
        options:
          - 'yes'
          - 'no'

jobs:
  replace:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 📥 دریافت مخزن (با LFS)
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: 🛠️ نصب ابزارها
        run: |
          sudo apt-get update
          sudo apt-get install -y git-lfs ffmpeg
          git lfs install

      - name: 🎯 دریافت فایل واقعی از LFS
        env:
          FILE: ${{ github.event.inputs.filepath }}
        run: |
          echo "Fetching $FILE"
          git lfs fetch --include="$FILE"
          git lfs checkout "$FILE"
          ls -lah "$FILE"

      - name: 🎵 تبدیل به MP3 (در صورت انتخاب)
        if: github.event.inputs.keep_as_mp3 == 'yes'
        env:
          FILE: ${{ github.event.inputs.filepath }}
        run: |
          BASENAME=$(basename "$FILE" | sed 's/\.[^.]*$//')
          NEWFILE="$(dirname "$FILE")/${BASENAME}.mp3"
          ffmpeg -i "$FILE" -vn -acodec libmp3lame -ab 192k "$NEWFILE"
          echo "NEW_FILE=$NEWFILE" >> $GITHUB_ENV
          echo "NEW_FILENAME=$BASENAME.mp3" >> $GITHUB_ENV

      - name: 📁 استفاده از فایل اصلی (بدون تبدیل)
        if: github.event.inputs.keep_as_mp3 == 'no'
        env:
          FILE: ${{ github.event.inputs.filepath }}
        run: |
          echo "NEW_FILE=$FILE" >> $GITHUB_ENV
          echo "NEW_FILENAME=$(basename "$FILE")" >> $GITHUB_ENV

      - name: 🚀 جایگزینی و ارسال (با rebase ایمن)
        env:
          FILE: ${{ github.event.inputs.filepath }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # حذف اشاره‌گر LFS قدیمی
          git rm "$FILE"
          
          # افزودن فایل جدید واقعی
          git add "${{ env.NEW_FILE }}"
          
          git commit -m "✅ Replace LFS pointer of '$(basename "$FILE")' with actual MP3 file"
          
          # دریافت تغییرات ریموت و بازنویسی ایمن
          git pull --rebase origin main
          
          git push origin main
