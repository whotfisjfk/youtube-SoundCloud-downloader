name: 🎵 Extract and download LFS file as MP3

on:
  workflow_dispatch:
    inputs:
      filepath:
        description: 'مسیر کامل فایل LFS (نسبت به ریشهٔ مخزن)'
        required: true
      convert_to_mp3:
        description: 'تبدیل به MP3؟ (فقط برای فایل‌های صوتی/تصویری)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout with LFS
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: 🛠️ Install Git LFS & ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y git-lfs ffmpeg
          git lfs install

      - name: 📥 Pull the LFS file (real content)
        env:
          FILE: ${{ github.event.inputs.filepath }}
        run: |
          echo "Fetching $FILE"
          git lfs fetch --include="$FILE"
          git lfs checkout "$FILE"
          ls -lah "$FILE"

      - name: 🎧 Convert to MP3 (optional)
        if: github.event.inputs.convert_to_mp3 == 'true'
        env:
          FILE: ${{ github.event.inputs.filepath }}
        run: |
          BASENAME=$(basename "$FILE" | sed 's/\.[^.]*$//')
          OUTPUT="${BASENAME}.mp3"
          ffmpeg -i "$FILE" -vn -acodec libmp3lame -ab 192k "$OUTPUT"
          echo "OUTPUT_FILE=$OUTPUT" >> $GITHUB_ENV

      - name: 📁 Use original file (if no conversion)
        if: github.event.inputs.convert_to_mp3 == 'false'
        env:
          FILE: ${{ github.event.inputs.filepath }}
        run: |
          echo "OUTPUT_FILE=$FILE" >> $GITHUB_ENV

      - name: 📤 Upload as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: extracted-file
          path: ${{ env.OUTPUT_FILE }}
