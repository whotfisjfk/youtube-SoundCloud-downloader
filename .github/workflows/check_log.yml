name: Check RSS Log and Trigger Downloads

on:
  schedule:
    - cron: '*/10 * * * *'   # هر ۱۰ دقیقه
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install requests
        run: pip install requests

      - name: Run check script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python check_and_trigger.py

      - name: Commit updated processed.txt
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add processed.txt
          git diff --staged --quiet || git commit -m "Update processed state"
          git push
