name: 🛟 Restore original LFS file (find & fix)

on:
  workflow_dispatch:
    inputs:
      filepath:
        description: 'مسیر فایل خراب شده (همان که قبلاً وارد کرده‌اید)'
        required: true

jobs:
  restore:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 📥 Checkout full history + LFS
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: 🛠️ Install Git LFS
        run: |
          sudo apt-get update
          sudo apt-get install -y git-lfs
          git lfs install

      - name: 🔍 Find original LFS file and restore it
        env:
          INPUT_FILE: ${{ github.event.inputs.filepath }}
        run: |
          python3 << 'PYEOF'
          import subprocess, os, sys

          target = os.environ["INPUT_FILE"]
          target_basename = os.path.basename(target)

          # لیست تمام فایل‌های LFS
          out = subprocess.check_output(["git", "lfs", "ls-files", "--all"], text=True)
          lfs_file = None
          for line in out.splitlines():
              # فرمت: <SHA> * <path>
              parts = line.strip().split(" * ")
              if len(parts) == 2:
                  sha, path = parts
                  if os.path.basename(path) == target_basename:
                      lfs_file = path
                      break

          if not lfs_file:
              print(f"❌ فایل '{target_basename}' در لیست LFS پیدا نشد.")
              sys.exit(1)

          print(f"✅ فایل LFS اصلی: {lfs_file}")

          # دریافت فایل واقعی از LFS
          subprocess.run(["git", "lfs", "fetch", "--include=" + lfs_file], check=True)
          subprocess.run(["git", "lfs", "checkout", "--", lfs_file], check=True)

          # اگر مسیر متفاوت بود، فایل را به مسیر اصلی کپی می‌کنیم
          if lfs_file != target:
              import shutil
              os.makedirs(os.path.dirname(target), exist_ok=True)
              shutil.copy(lfs_file, target)
              print(f"📁 کپی به مسیر اصلی: {target}")
          else:
              print(f"📁 فایل در همان مسیر اصلی قرار دارد.")

          # خروجی برای گام بعدی
          with open(os.environ["GITHUB_ENV"], "a") as f:
              f.write(f"RESTORED_FILE={target}\n")
          PYEOF

      - name: 🚀 Commit and push the restored file
        env:
          RESTORED_FILE: ${{ env.RESTORED_FILE }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "$RESTORED_FILE"

          if git diff --staged --quiet; then
            echo "ℹ️ فایل از قبل سالم بود، نیازی به commit نیست."
          else
            git commit -m "🧼 Restore original LFS file: $(basename "$RESTORED_FILE")"
            git pull --rebase origin main
            git push origin main
            echo "✅ فایل با موفقیت بازیابی و جایگزین شد."
          fi
