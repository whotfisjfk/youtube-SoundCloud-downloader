name: 📥 YouTube Downloader → Release

on:
  workflow_dispatch:
    inputs:
      url:
        description: '🔗 لینک ویدئوی یوتیوب'
        required: true
      format:
        description: '🎬 خروجی'
        required: true
        default: 'video'
        type: choice
        options:
          - 'video'
          - 'audio'
      folder:
        description: '📁 پوشه موقت دانلود'
        required: false
        default: 'downloads'

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 دریافت فایل‌های مخزن
        uses: actions/checkout@v4

      - name: ⚙️ نصب yt-dlp
        uses: AnimMouse/setup-yt-dlp@v3

      - name: 🧹 پاکسازی پوشهٔ دانلود
        run: rm -rf "${{ github.event.inputs.folder }}"/*

      - name: 🎬 دانلود ویدئو (MP4)
        if: github.event.inputs.format == 'video'
        run: |
          mkdir -p "${{ github.event.inputs.folder }}"
          yt-dlp -f "bestvideo[height<=1080]+bestaudio/best[height<=1080]" \
            --merge-output-format mp4 \
            --cookies cookies.txt \
            --restrict-filenames \
            --force-overwrites \
            "${{ github.event.inputs.url }}" \
            -o "${{ github.event.inputs.folder }}/%(id)s.%(ext)s"

      - name: 🎵 دانلود صوت (MP3)
        if: github.event.inputs.format == 'audio'
        run: |
          mkdir -p "${{ github.event.inputs.folder }}"
          yt-dlp -f "bestaudio[ext=m4a]/bestaudio/best" \
            --audio-format mp3 \
            --audio-quality 0 \
            --cookies cookies.txt \
            --restrict-filenames \
            --force-overwrites \
            --no-playlist \
            "${{ github.event.inputs.url }}" \
            -o "${{ github.event.inputs.folder }}/%(id)s.%(ext)s"

      - name: 🚀 ذخیره فایل در مخزن (با Git LFS)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          sudo apt-get update && sudo apt-get install -y git-lfs
          git lfs install
          git lfs track "*.mp4" "*.mp3" "*.webm" "*.mkv"
          git add .gitattributes "${{ github.event.inputs.folder }}"
          git commit -m "افزودن فایل از یوتیوب" || echo "هیچ فایل جدیدی نیست"
          git push

      - name: 📦 انتشار در Release (فقط فایل جدید)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_FILE=$(git diff --name-only HEAD~1 HEAD -- "${{ github.event.inputs.folder }}/" | head -1)
          if [ -z "$NEW_FILE" ]; then
            echo "هیچ فایل جدیدی برای انتشار وجود ندارد."
            exit 0
          fi
          echo "فایل جدید برای انتشار: $NEW_FILE"

          if gh release view latest &> /dev/null; then
            echo "Release 'latest' پیدا شد. آپلود فایل جدید..."
            gh release upload latest "$NEW_FILE" --clobber
          else
            echo "ایجاد Release جدید با tag 'latest'..."
            gh release create latest "$NEW_FILE" \
              --title "مجموعه دانلودهای یوتیوب" \
              --notes "فایل‌های دانلود شده به‌صورت خودکار اینجا قرار می‌گیرند."
          fi
