name: 📥 YouTube Downloader (مستقیم و مطمئن)

on:
  workflow_dispatch:
    inputs:
      url:
        description: '🔗 لینک ویدئوی یوتیوب'
        required: true
      format:
        description: '🎬 خروجی'
        required: true
        default: 'video'
        type: choice
        options:
          - 'video'
          - 'audio'
      folder:
        description: '📁 پوشه ذخیره (اختیاری)'
        required: false
        default: 'downloads'

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 دریافت فایل‌های مخزن
        uses: actions/checkout@v4

      - name: ⚙️ نصب yt-dlp
        uses: AnimMouse/setup-yt-dlp@v3

      - name: 🔑 دریافت توکن PoW (مستقیم از باینری)
        id: get_pot
        run: |
          # دانلود ابزار تولید توکن از آخرین ریلیز
          curl -sL https://github.com/coletdjnz/yt-dlp-po-token-action/releases/latest/download/generate-po-token-linux-x64.tar.gz | tar xz
          chmod +x generate-po-token
          PO_TOKEN=$(./generate-po-token)
          echo "po_token=$PO_TOKEN" >> $GITHUB_OUTPUT
          echo "توکن با موفقیت تولید شد: $PO_TOKEN"

      - name: 🎬 دانلود ویدئو (MP4)
        if: github.event.inputs.format == 'video'
        run: |
          mkdir -p "${{ github.event.inputs.folder }}"
          yt-dlp -f "bestvideo[height<=1080]+bestaudio/best[height<=1080]" \
            --merge-output-format mp4 \
            --extractor-args "youtube:player_client=web;po_token=web.gvs+${{ steps.get_pot.outputs.po_token }}" \
            "${{ github.event.inputs.url }}" \
            -o "${{ github.event.inputs.folder }}/%(title)s.%(ext)s"

      - name: 🎵 دانلود صوت (MP3)
        if: github.event.inputs.format == 'audio'
        run: |
          mkdir -p "${{ github.event.inputs.folder }}"
          yt-dlp -f bestaudio --extract-audio --audio-format mp3 \
            --extractor-args "youtube:player_client=web;po_token=web.gvs+${{ steps.get_pot.outputs.po_token }}" \
            "${{ github.event.inputs.url }}" \
            -o "${{ github.event.inputs.folder }}/%(title)s.%(ext)s"

      - name: 🚀 ذخیره در مخزن
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ github.event.inputs.folder }}"
          git commit -m "افزودن فایل از یوتیوب" || echo "فایل جدیدی وجود ندارد"
          git push
