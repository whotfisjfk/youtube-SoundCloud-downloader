name: 📥 YouTube Downloader (via Invidious – بدون خطا)

on:
  workflow_dispatch:
    inputs:
      url:
        description: '🔗 لینک ویدئوی یوتیوب'
        required: true
      format:
        description: '🎬 خروجی'
        required: true
        default: 'video'
        type: choice
        options:
          - 'video'
          - 'audio'
      folder:
        description: '📁 پوشه ذخیره'
        required: false
        default: 'downloads'

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 دریافت فایل‌های مخزن
        uses: actions/checkout@v4

      - name: ⚙️ نصب yt-dlp
        uses: AnimMouse/setup-yt-dlp@v3

      - name: 🎬 دانلود ویدئو (MP4)
        if: github.event.inputs.format == 'video'
        run: |
          mkdir -p "${{ github.event.inputs.folder }}"
          # تبدیل لینک یوتیوب به معادل Invidious
          URL="${{ github.event.inputs.url }}"
          VIDEO_ID=$(echo "$URL" | sed -n 's/.*v=\([a-zA-Z0-9_-]*\).*/\1/p')
          [ -z "$VIDEO_ID" ] && VIDEO_ID=$(echo "$URL" | sed -n 's/.*youtu\.be\/\([a-zA-Z0-9_-]*\).*/\1/p')
          INVIDIOUS_URL="https://inv.nadeko.net/watch?v=${VIDEO_ID}"
          echo "Using Invidious URL: $INVIDIOUS_URL"
          yt-dlp -f "bestvideo[height<=1080]+bestaudio/best[height<=1080]" \
            --merge-output-format mp4 \
            "$INVIDIOUS_URL" \
            -o "${{ github.event.inputs.folder }}/%(title)s.%(ext)s"

      - name: 🎵 دانلود صوت (MP3)
        if: github.event.inputs.format == 'audio'
        run: |
          mkdir -p "${{ github.event.inputs.folder }}"
          URL="${{ github.event.inputs.url }}"
          VIDEO_ID=$(echo "$URL" | sed -n 's/.*v=\([a-zA-Z0-9_-]*\).*/\1/p')
          [ -z "$VIDEO_ID" ] && VIDEO_ID=$(echo "$URL" | sed -n 's/.*youtu\.be\/\([a-zA-Z0-9_-]*\).*/\1/p')
          INVIDIOUS_URL="https://inv.nadeko.net/watch?v=${VIDEO_ID}"
          yt-dlp -f bestaudio --extract-audio --audio-format mp3 \
            "$INVIDIOUS_URL" \
            -o "${{ github.event.inputs.folder }}/%(title)s.%(ext)s"

      - name: 🚀 ذخیره در مخزن
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ github.event.inputs.folder }}"
          git commit -m "افزودن فایل از یوتیوب" || echo "فایل جدیدی وجود ندارد"
          git push
